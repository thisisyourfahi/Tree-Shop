<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Shop</title>

    <!-- daisyui + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="container mx-auto">
    <h1 class="text-success font-bold text-6xl text-center mb-4">Choose Your Plant</h1>

    <main>
        <!-- plant info modal -->
        <!-- You can open the modal using ID.showModal() method -->
        <dialog id="plant-info-modal" class="modal">
            <div class="modal-box">

            </div>
        </dialog>

        <!-- categories, plants, cart -->
        <section class="grid gap-2 grid-cols-5">
            <!-- left container -->
            <div class="col-span-1 border border-dotted p-8 space-y-3 bg-green-100">
                <h2 class="text-center text-2xl font-semibold">Categories</h2>
                <button onclick="loadTrees('button-all')" id="button-all" class="btn btn-outline w-full btn-success">
                    All Trees
                </button>

                <!-- categories buttons will be displayed dynamically -->
                <div id="categories-buttons" class="space-y-3">

                </div>
            </div>

            <!-- middle container displaying trees-->
            <div class="col-span-3  p-8 border border-dotted bg-lime-100">
                <div id="trees-container" class="grid grid-cols-3 gap-4">

                </div>
            </div>

            <!-- cart container -->
            <div class="border pt-8 px-2 border-dotted bg-green-100 space-y-2">
                <h2 class="text-center text-2xl font-semibold">Cart</h2>

                <!-- items in the cart -->
                <div id="cart-items" class="bg-white p-2 rounded-lg space-y-2">
                </div>

                <!-- empty cart message -->
                <div id="empty-cart" class="bg-white p-2 rounded-lg hidden">
                    <p class="text-center text-sm">
                        Your cart is empty. <br>
                        Add Trees to get started
                    </p>
                </div>

                <!-- total price -->
                <div class="flex justify-between p-2 bg-gray-200 rounded-lg">
                    <p class="font-semibold">Total</p>
                    <p id="total-price" class="font-semibold">$0</p>
                </div>

                <!-- Check Out -->
                <div id="check-out" class="flex justify-center">
                    <button onclick="checkOut()" class="w-full btn btn-success">Check Out</button>
                </div>
            </div>
        </section>
    </main>

    <!-- script -->
    <script src="./script.js"></script>
</body>

</html>
