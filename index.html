<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Shop</title>

    <!-- daisyui + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="container mx-auto">
    <h1 class="text-success font-bold text-6xl text-center mb-4">Choose Your Plant</h1>

    <main>
        <!-- plant info modal -->
        <!-- You can open the modal using ID.showModal() method -->
        <button class="btn" onclick="plant-info-modal.showModal()">open modal</button>
        <dialog id="plant-info-modal" class="modal">
            <div class="modal-box">
                <form method="dialog">
                    <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
                </form>
                <h3 class="text-xl text-success font-semibold">${plant.name}</h3>
                <figure class="h-[200px] cursor-pointer">
                    <img src="${plant.image}" alt="">
                </figure>
                <div class="badge badge-outline badge-success">${plant.category}</div>
                <p>
                    Description: ${plant.description}
                </p>
                <div class="card-actions justify-between items-center">
                    <p class="text-success text-2xl">$${plant.price}</p>
                </div>
            </div>
        </dialog>

        <!-- categories, plants, cart -->
        <section class="grid gap-2 grid-cols-5">
            <!-- left container -->
            <div class="col-span-1 border border-dotted p-8 space-y-3 bg-green-100">
                <h2 class="text-center text-2xl font-semibold">Categories</h2>
                <button onclick="loadTrees('button-all')" id="button-all" class="btn btn-outline w-full btn-success">
                    All Trees
                </button>

                <!-- categories buttons will be displayed dynamically -->
                <div id="categories-buttons" class="space-y-3">

                </div>
            </div>

            <!-- middle container displaying trees-->
            <div class="col-span-3  p-8 border border-dotted bg-lime-100">
                <div id="trees-container" class="grid grid-cols-3 gap-4">

                </div>
            </div>

            <!-- cart container -->
            <div class="border border-dotted bg-green-100">

            </div>
        </section>
    </main>

    <!-- script -->
    <script src="./script.js"></script>
</body>

</html>
