<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Shop</title>

    <!-- daisyui + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="container mx-auto">
    <h1 class="text-success font-bold text-6xl text-center">Choose Your Plant</h1>

    <main>
        <section class="grid grid-cols-5">
            <!-- left container -->
            <div class="col-span-1 bg-gray-200 p-8 space-y-3">
                <h2 class="text-center text-2xl font-semibold">Categories</h2>
                <button id="all" class="btn btn-outline w-full btn-success">
                    All Trees
                </button>

                <!-- categories buttons will be displayed dynamically -->
                <div id="categories-buttons" class="space-y-3">

                </div>
            </div>

            <!-- middle container displaying trees-->
            <div class="col-span-3 bg-violet-200 p-8">
                <div id="trees-container" class="grid grid-cols-3 gap-4">
                    
                </div>
            </div>

            <!-- cart container -->
            <div class="bg-blue-200">

            </div>
        </section>
    </main>

    <!-- script -->
    <script src="./script.js"></script>
</body>

</html>
